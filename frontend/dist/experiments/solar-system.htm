<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thí nghiệm 3D · Hệ Mặt Trời</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #0b1020; font-family: system-ui, sans-serif; }
  #app { position: fixed; inset: 0; }
  .panel {
    position: fixed; left: 16px; bottom: 16px; z-index: 10;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 16px; border-radius: 14px;
    background: rgba(20, 24, 48, 0.7); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); color: #e6e9ff;
  }
  .panel label { font-size: 13px; font-weight: 600; }
  .panel input[type=range] { accent-color: #22c55e; cursor: pointer; }
  .panel button {
    cursor: pointer; border: 0; border-radius: 9px; padding: 7px 12px;
    font-weight: 700; font-size: 13px; color: #fff; background: #4f46e5;
    transition: background .2s;
  }
  .panel button:hover { background: #4338ca; }
  .hint { position: fixed; top: 14px; left: 16px; z-index: 10; color: #aab0d8; font-size: 12px; }
</style>
</head>
<body>
<div id="app"></div>
<div class="hint">Kéo để xoay · Cuộn để phóng to</div>
<div class="panel">
  <label>Tốc độ</label>
  <input id="speed" type="range" min="0" max="3" step="0.1" value="1" />
  <button id="reset">Đặt lại góc nhìn</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const app = document.getElementById('app');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1020);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 60, 130);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 30; controls.maxDistance = 400;

// Sao nền
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1500; i++) {
  starPos.push((Math.random()-0.5)*1600, (Math.random()-0.5)*1600, (Math.random()-0.5)*1600);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x9fb0ff, size: 1.2 })));

// Mặt Trời
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(8, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0xffcc44 })
);
scene.add(sun);
scene.add(new THREE.PointLight(0xffffff, 2.5, 0, 0.4));
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

// Các hành tinh: [bán kính, khoảng cách, màu, tốc độ]
const data = [
  [1.2, 16, 0x9a9a9a, 1.6],
  [2.0, 24, 0xe0a060, 1.2],
  [2.2, 34, 0x3b82f6, 1.0],
  [1.6, 44, 0xc1440e, 0.8],
  [4.5, 62, 0xd9a066, 0.45],
  [3.8, 82, 0xf0d090, 0.32],
];
const planets = [];
for (const [r, dist, color, spd] of data) {
  const pivot = new THREE.Object3D();
  scene.add(pivot);
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(r, 32, 32),
    new THREE.MeshStandardMaterial({ color, roughness: 0.8 })
  );
  mesh.position.x = dist;
  pivot.add(mesh);
  // Quỹ đạo
  const orbit = new THREE.Mesh(
    new THREE.RingGeometry(dist-0.1, dist+0.1, 96),
    new THREE.MeshBasicMaterial({ color: 0x333a66, side: THREE.DoubleSide })
  );
  orbit.rotation.x = Math.PI/2;
  scene.add(orbit);
  planets.push({ pivot, mesh, spd, phase: Math.random()*Math.PI*2 });
}

let speed = 1;
document.getElementById('speed').addEventListener('input', e => speed = +e.target.value);
document.getElementById('reset').addEventListener('click', () => {
  camera.position.set(0, 60, 130); controls.target.set(0,0,0); controls.update();
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  sun.rotation.y += 0.002;
  for (const p of planets) {
    p.pivot.rotation.y = p.phase + t * p.spd * speed * 0.3;
    p.mesh.rotation.y += 0.01;
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
